  <text x="452" y="258" font-size="13" font-weight="bold" text-anchor="end">3 / 2</text>
  <rect x="52" y="264" width="300" height="7" fill="#fff" stroke="#000" stroke-width="1"/>
  <rect x="52" y="264" width="300" height="7" fill="#000"/>

  <!-- L2 en meta -->
  <circle cx="36" cy="290" r="7" fill="#000"/>
