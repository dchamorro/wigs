  <rect x="490" y="118" width="18" height="18" rx="2" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <polyline points="493,127 499,133 506,120" fill="none" stroke="#000" stroke-width="2.2"/>
  <text x="520" y="126" font-size="13.5">Cotizar 30 equipos del pipeline</text>
