  <text x="520" y="289" font-size="11" letter-spacing="0.5">WIG 5 · L1 · PENDIENTE</text>

  <!-- ===== Pie ===== -->
  <line x1="16" y1="452" x2="784" y2="452" stroke="#000" stroke-width="1"/>
  <text x="24" y="468" font-size="11">Actualizado lun 8:00 · vía PGX (LAN)</text>
  <g font-size="11">
    <circle cx="556" cy="464" r="6" fill="#000"/>
    <text x="566" y="468">en meta</text>
    <circle cx="636" cy="464" r="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <path d="M636,458 A6,6 0 0,0 636,470 Z" fill="#000"/>
    <text x="646" y="468">riesgo</text>
    <circle cx="710" cy="464" r="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="720" y="468">atrasado</text>
