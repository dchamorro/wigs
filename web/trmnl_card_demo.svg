<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" font-family="Helvetica, Arial, sans-serif">
  <!-- e-ink 1-bit: solo negro sobre blanco -->
  <rect x="0" y="0" width="800" height="480" fill="#ffffff"/>
