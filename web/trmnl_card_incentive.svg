<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="800" height="480" fill="#ffffff"/>
  <rect x="6" y="6" width="788" height="468" rx="6" fill="none" stroke="#000" stroke-width="3"/>

  <!-- Encabezado -->
  <text x="24" y="44" font-size="28" font-weight="bold">Mi incentivo</text>
  <text x="24" y="65" font-size="14">Variable ligado al avance de mis WIG · sin montos</text>
  <text x="776" y="36" font-size="17" font-weight="bold" text-anchor="end">Q2 2026</text>
  <text x="776" y="58" font-size="14" text-anchor="end">corte sem. 22</text>
  <line x1="16" y1="78" x2="784" y2="78" stroke="#000" stroke-width="2"/>
  <line x1="474" y1="88" x2="474" y2="446" stroke="#000" stroke-width="1"/>

  <!-- Hero progreso (izquierda) -->
  <text x="24" y="106" font-size="13" font-weight="bold" letter-spacing="1.2">PROGRESO HACIA MI OBJETIVO</text>
  <text x="24" y="168" font-size="52" font-weight="bold">64%</text>
  <text x="170" y="168" font-size="20">del objetivo</text>

  <circle cx="32" cy="200" r="8" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <path d="M32,192 A8,8 0 0,0 32,208 Z" fill="#000"/>
  <text x="50" y="205" font-size="15">En ritmo para cerrar el trimestre</text>

  <rect x="24" y="222" width="420" height="18" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <rect x="24" y="222" width="269" height="18" fill="#000"/>

  <text x="24" y="282" font-size="14">Proyección al ritmo actual: <tspan font-weight="bold">~85% del objetivo</tspan></text>

  <line x1="24" y1="306" x2="444" y2="306" stroke="#000" stroke-width="1"/>
  <text x="24" y="332" font-size="13">Esta pantalla no muestra montos.</text>
  <text x="24" y="352" font-size="13">El detalle de pago vive en la app privada (con login).</text>

  <!-- Cómo se compone (derecha) -->
  <text x="486" y="106" font-size="13" font-weight="bold" letter-spacing="1.2">CÓMO SE COMPONE (PONDERADO)</text>

  <text x="486" y="140" font-size="13.5">Lead measures de mi equipo</text>
  <text x="770" y="140" font-size="13.5" font-weight="bold" text-anchor="end">79%</text>
  <rect x="486" y="148" width="220" height="12" fill="#fff" stroke="#000" stroke-width="1.2"/>
  <rect x="486" y="148" width="174" height="12" fill="#000"/>
  <text x="486" y="176" font-size="11">WIG 1 &amp; 5 · peso 50%</text>

  <text x="486" y="208" font-size="13.5">Cumplimiento de compromisos</text>
  <text x="770" y="208" font-size="13.5" font-weight="bold" text-anchor="end">71%</text>
  <rect x="486" y="216" width="220" height="12" fill="#fff" stroke="#000" stroke-width="1.2"/>
  <rect x="486" y="216" width="156" height="12" fill="#000"/>
  <text x="486" y="244" font-size="11">semana a semana · peso 30%</text>

  <text x="486" y="276" font-size="13.5">Avance WIG de compañía (NAT)</text>
  <text x="770" y="276" font-size="13.5" font-weight="bold" text-anchor="end">38%</text>
  <rect x="486" y="284" width="220" height="12" fill="#fff" stroke="#000" stroke-width="1.2"/>
  <rect x="486" y="284" width="84" height="12" fill="#000"/>
  <text x="486" y="312" font-size="11">cobertura de backlog · peso 20%</text>

  <line x1="486" y1="332" x2="784" y2="332" stroke="#000" stroke-width="1"/>
  <text x="486" y="356" font-size="14" font-weight="bold">Ponderado → 64% del objetivo</text>

  <!-- Pie -->
  <line x1="16" y1="452" x2="784" y2="452" stroke="#000" stroke-width="1"/>
  <text x="24" y="468" font-size="11">Solo progreso relativo · montos en app privada (login)</text>
  <g font-size="11">
    <circle cx="600" cy="464" r="6" fill="#000"/>
    <text x="610" y="468">en meta</text>
    <circle cx="680" cy="464" r="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <path d="M680,458 A6,6 0 0,0 680,470 Z" fill="#000"/>
    <text x="690" y="468">en ritmo</text>
    <circle cx="758" cy="464" r="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="768" y="468">atrás</text>
  </g>
</svg>
