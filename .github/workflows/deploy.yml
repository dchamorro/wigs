name: Deploy WIG scoreboard
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Excel contract
        run: |
          pip install openpyxl
          WIG_XLSX=web/tablero.xlsx python3 tests/test_contract.py
      - name: Set default document
        run: cp web/marcador.html web/index.html
      - name: Verify deploy contents
        run: ls -la web
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: millionnat
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: dist
