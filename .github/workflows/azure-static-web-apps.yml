name: Publicar marcador en Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/azure-static-web-apps.yml'
  workflow_dispatch:

concurrency:
  group: azure-swa-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Modo arrastrar-y-soltar: tablero.xlsx NO se publica (datos financieros
      # internos, el sitio aún no tiene login — ver "Pendiente" en README).
      - name: Preparar sitio
        run: |
          mkdir -p _site
          cp web/marcador.html _site/marcador.html
          cp web/marcador.html _site/index.html
          cp web/staticwebapp.config.json _site/

      - name: Deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: '_site'
          skip_app_build: true
