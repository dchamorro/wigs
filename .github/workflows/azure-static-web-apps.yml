name: Publicar marcador en Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/azure-static-web-apps.yml'
  workflow_dispatch:

concurrency:
  group: azure-swa-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # El sitio exige login de empresa (Entra ID, un solo tenant) vía
      # web/staticwebapp.config.json — solo cuentas @caobagroup.com entran.
      # Requiere el tier Standard de Static Web Apps y, en el portal:
      #   1) App registration de Entra (client id + secret).
      #   2) App settings AAD_CLIENT_ID / AAD_CLIENT_SECRET en la Static Web App.
      #   3) El TENANT_ID en el openIdIssuer (reemplaza el placeholder de abajo).
      # La TV de la oficina NO usa este sitio: lee del PGX por LAN (sin login).
      - name: Verificar que el tenant de Entra esté configurado
        run: |
          if grep -q "REEMPLAZAR-TENANT-ID" web/staticwebapp.config.json; then
            echo "::error::Falta el TENANT_ID de Entra en web/staticwebapp.config.json (auth.identityProviders.azureActiveDirectory.registration.openIdIssuer). Sin él el login quedaría mal configurado."
            exit 1
          fi

      - name: Preparar sitio
        run: |
          mkdir -p _site
          if [ -f web/tablero.xlsx ]; then
            sed "s/const CONFIG = { DATA_URL: ''/const CONFIG = { DATA_URL: 'tablero.xlsx'/" web/marcador.html > _site/marcador.html
            [ "$(grep -c "const CONFIG = { DATA_URL: 'tablero.xlsx'" _site/marcador.html)" = "1" ] || { echo "::error::No se pudo configurar DATA_URL — cambió la línea CONFIG en marcador.html"; exit 1; }
            cp web/tablero.xlsx _site/
          else
            echo "::warning::web/tablero.xlsx no existe — se publica en modo arrastrar-y-soltar; correr 'make publicar DATOS=...' para subir datos"
            cp web/marcador.html _site/marcador.html
          fi
          cp _site/marcador.html _site/index.html
          cp web/staticwebapp.config.json _site/

      - name: Deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: '_site'
          skip_app_build: true
